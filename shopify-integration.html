<!--
============================================================
SHOPIFY INTEGRATION
============================================================
1. theme.liquid — capturează _fbp/_fbc și le stochează
2. checkout.liquid (Plus) — injectează pixelul la checkout  
3. Additional scripts în Shopify Settings → Checkout
============================================================
-->

<!-- ============================================================
  PASUL 1: Adaugă în theme.liquid, înainte de </head>
  Salvează cookie-urile Meta în note_attributes la checkout
============================================================ -->
<script>
(function() {
  // Capturează _fbp și _fbc din cookies
  function getCookie(name) {
    const m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return m ? m[2] : null;
  }

  const fbp = getCookie('_fbp');
  const fbc = getCookie('_fbc');

  // Salvează în sessionStorage pentru a le trimite la checkout
  if (fbp) sessionStorage.setItem('meta_fbp', fbp);
  if (fbc) sessionStorage.setItem('meta_fbc', fbc);

  // Injectează în note_attributes Shopify (la submit cart/checkout)
  document.addEventListener('submit', function(e) {
    const form = e.target;
    if (!form) return;

    const action = (form.action || '').toLowerCase();
    if (!action.includes('cart') && !action.includes('checkout')) return;

    const storedFbp = sessionStorage.getItem('meta_fbp');
    const storedFbc = sessionStorage.getItem('meta_fbc');

    function addHidden(name, value) {
      if (!value) return;
      const existing = form.querySelector(`input[name="${name}"]`);
      if (existing) { existing.value = value; return; }
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = name;
      input.value = value;
      form.appendChild(input);
    }

    // Questi campi finiscono in order.note_attributes
    addHidden('attributes[_fbp]', storedFbp);
    addHidden('attributes[_fbc]', storedFbc);
  });
})();
</script>


<!-- ============================================================
  PASUL 2: Shopify Admin → Settings → Checkout → 
  Additional scripts (Order status page)
  
  Acesta trimite Purchase la Meta imediat după confirmare
============================================================ -->
{% if first_time_accessed %}
<script>
(function() {
  const orderData = {
    id: {{ order.id }},
    total: {{ order.total_price | money_without_currency }},
    currency: '{{ order.currency }}',
    items: [
      {% for item in order.line_items %}
      {
        product_id: '{{ item.product_id }}',
        quantity: {{ item.quantity }},
        price: {{ item.price | money_without_currency }}
      }{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ]
  };

  // Trimite Purchase prin pixelul enhanced
  if (window.MetaPixelEnhanced) {
    window.MetaPixelEnhanced.trackPurchase({
      value: orderData.total,
      currency: orderData.currency,
      order_id: String(orderData.id),
      content_ids: orderData.items.map(i => i.product_id),
      contents: orderData.items,
      num_items: orderData.items.reduce((s, i) => s + i.quantity, 0)
    });
  } else if (typeof fbq !== 'undefined') {
    // Fallback: pixel standard
    fbq('track', 'Purchase', {
      value: orderData.total,
      currency: orderData.currency,
      content_ids: orderData.items.map(i => i.product_id),
      content_type: 'product'
    }, { eventID: 'shopify_{{ order.id }}' });
  }
})();
</script>
{% endif %}
